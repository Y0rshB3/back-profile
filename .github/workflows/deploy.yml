name: Deploy Backend

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to Raspberry Pi
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.RASPBERRY_HOST }}
        username: ${{ secrets.RASPBERRY_USER }}
        password: ${{ secrets.RASPBERRY_PASSWORD }}
        script: |
          cd /home/y0rshb3/devops/temp_backend
          git pull origin main
          npm install
          docker restart backend
          echo ✅ Backend deployed successfully!
          
          # Verificar que el backend esté funcionando
          sleep 5
          curl -f http://localhost:4000/api/v1/info/home || echo ❌ Backend health check failed
